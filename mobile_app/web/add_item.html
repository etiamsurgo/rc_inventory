<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Item - RC Inventory</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header><h1>Add Item</h1></header>
<nav>
  <div class="nav-main">
    <a href="index.html">Home</a>
    <a href="items.html">Accessories</a>
  </div>
</nav>
<main class="container">
  <form id="item-form">
    <label>Name<input name="name" required/></label>
    <label>Category<input name="category" /></label>
    <label>Brand<input name="brand" /></label>
    <label>Model<input name="model" /></label>
    <label>Notes<textarea name="notes"></textarea></label>
    <label>Picture<input type="file" name="picture" accept="image/*" /></label>
    <div id="preview"></div>
    <button class="btn" type="submit">Save</button>
  </form>
</main>
<script src="/static/sqlite-adapter.js"></script>
<script src="/static/filesystem-adapter.js"></script>
<script src="/static/data-layer.js"></script>
<script>
(async function(){
  await DataLayer.init();
  const form = document.getElementById('item-form');
  const preview = document.getElementById('preview');

  form.picture.addEventListener('change', async function(e){
    const f = e.target.files[0];
    if(!f) return;
    const saved = await FilesystemAdapter.saveFile(f);
    preview.innerHTML = `<img src="${saved.url||''}" style="max-width:120px; border-radius:8px;">`;
    preview.dataset.path = saved.path || '';
  });

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const fd = new FormData(form);
    const picture_path = preview.dataset.path || null;
    await DataLayer.addItem({ name: fd.get('name'), category: fd.get('category'), brand: fd.get('brand'), model: fd.get('model'), notes: fd.get('notes'), picture_filename: picture_path });
    window.location.href = 'items.html';
  });
})();
</script>
</body>
</html>
