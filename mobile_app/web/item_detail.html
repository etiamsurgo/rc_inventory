<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Item Detail - RC Inventory</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header><h1>Item Detail</h1></header>
<nav>
  <div class="nav-main">
    <a href="index.html">Home</a>
    <a href="items.html">Accessories</a>
  </div>
</nav>
<main class="container">
  <div id="detail"></div>
</main>
<script src="/static/sqlite-adapter.js"></script>
<script src="/static/data-layer.js"></script>
<script>
function queryParam(name){
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

(async function(){
  await DataLayer.init();
  const id = queryParam('id');
  if(!id){ document.getElementById('detail').innerText='No item id'; return; }
  const item = await DataLayer.getItemById(id);
  if(!item){ document.getElementById('detail').innerText='Item not found'; return; }
  let imgHtml = '';
  if(item.picture_filename){
    const url = await FilesystemAdapter.getFileUrl(item.picture_filename, 'image/*');
    imgHtml = `<div><img src="${url||item.picture_filename}" style="max-width:160px;border-radius:8px;"></div>`;
  }

  document.getElementById('detail').innerHTML = `
    <div class="card">
      ${imgHtml}
      <div class="item-brand">${item.name}</div>
      <div class="item-model">${item.brand || ''} ${item.model || ''}</div>
      <p>${item.notes || ''}</p>
      <div class="card-actions">
        <a class="btn" href="edit_item.html?id=${item.id}">Edit</a>
        <a class="btn danger" id="delete-item">Delete</a>
        ${item.picture_filename ? '<a class="btn" id="delete-image">Delete Image</a>' : ''}
      </div>
    </div>
  `;

  // Wire delete actions
  document.getElementById('delete-item').addEventListener('click', async ()=>{
    if(!confirm('Delete this item?')) return;
    await DataLayer.deleteItem(item.id);
    window.location.href = 'items.html';
  });

  const delImgBtn = document.getElementById('delete-image');
  if(delImgBtn){
    delImgBtn.addEventListener('click', async ()=>{
      if(!confirm('Delete image?')) return;
      const ok = await FilesystemAdapter.deleteFile(item.picture_filename);
      if(ok){
        await DataLayer.updateItem(item.id, Object.assign({}, item, { picture_filename: null }));
        window.location.reload();
      } else {
        alert('Failed to delete image');
      }
    });
  }
})();
</script>
</body>
</html>
