<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accessories - RC Inventory</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
<h1>Accessories</h1>
</header>
<nav>
  <div class="nav-main">
    <a href="index.html">Home</a>
    <a href="aircraft.html">Aircraft</a>
    <a href="batteries.html">Batteries</a>
    <a href="items.html">Accessories</a>
  </div>
</nav>
<main class="container">
  <div id="items-list" class="grid"></div>
</main>
<script src="/static/sqlite-adapter.js"></script>
<script src="/static/data-layer.js"></script>
<script>
(async function(){
  try{
    await DataLayer.init();
    const items = await DataLayer.getItems();
    const container = document.getElementById('items-list');
    if(!items || items.length===0){
      container.innerHTML = '<p>No items found.</p>';
      return;
    }
    // build HTML and then populate preview URLs for items with pictures
    container.innerHTML = items.map(i => `
      <a class="card-link" href="item_detail.html?id=${i.id}">
      <div class="card" data-id="${i.id}">
        <div class="item-category">${i.category || ''}</div>
        <div class="item-brand">${i.name}</div>
        <div class="item-model">${i.brand || ''} ${i.model || ''}</div>
        <div class="thumb" style="margin-top:8px;"></div>
      </div>
      </a>
    `).join('');

    // fetch preview URLs for items that have picture_filename
    for(const i of items){
      if(i.picture_filename){
        const url = await FilesystemAdapter.getFileUrl(i.picture_filename, 'image/*');
        const card = container.querySelector(`.card[data-id="${i.id}"] .thumb`);
        if(card){
          card.innerHTML = `<img src="${url||i.picture_filename}" style="max-width:80px;border-radius:8px;">`;
        }
      }
    }
  }catch(err){
    console.error(err);
    document.getElementById('items-list').innerText = 'Error loading items.';
  }
})();
</script>
</body>
</html>
