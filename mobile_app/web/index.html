<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RC Inventory (Mobile)</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
<h1>RC Inventory (Mobile)</h1>
</header>
<nav>
  <div class="nav-main">
    <a href="index.html">Home</a>
    <a href="aircraft.html">Aircraft</a>
    <a href="batteries.html">Batteries</a>
    <a href="items.html">Accessories</a>
  </div>
</nav>
<main id="main" class="container">
  <p>Initializing app</p>
</main>

<script>
  async function initApp(){
    const main = document.getElementById('main');
    main.innerHTML = '<p>Initializing data layer...</p>';
    try{
      if(window.DataLayer && window.DataLayer.init){
        await window.DataLayer.init();
        // Data layer ready — navigate to aircraft list
        window.location.href = 'aircraft.html';
        return;
      } else {
        throw new Error('DataLayer not available');
      }
    }catch(err){
      console.error('DataLayer init error', err);
      main.innerHTML = '<p>Error initializing data layer. If running in a browser, native plugins are not available — open the pages manually or run on the emulator/device.</p>';
    }
  }

  document.addEventListener('DOMContentLoaded', initApp);
</script>
<script src="/static/sqlite-adapter.js"></script>
<script src="/static/data-layer.js"></script>
</body>
</html>
