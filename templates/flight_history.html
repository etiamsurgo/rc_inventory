{% extends "base.html" %}

{% block content %}

<h2>{{ aircraft.name }} Flight History</h2>

<table>

<tr>
<th>Date</th>
<th>Battery</th>
<th>Minutes</th>
</tr>

{% for f in flights %}

<tr>

<td>{{ f.date.strftime("%Y-%m-%d") }}</td>
<td>{{ f.battery.brand }}</td>
<td>{{ f.duration }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
