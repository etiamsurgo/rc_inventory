{% extends "base.html" %}

{% block content %}

<h2>Pilot Profile</h2>

<div class="form-container">

<form method="POST">

<label>Name</label>
<input type="text" name="name" value="{{ pilot.name or '' }}">

<label>AMA Number</label>
<input type="text" name="ama_number" value="{{ pilot.ama_number or '' }}">

<label>AMA Expiration</label>
<input type="date" name="ama_expiration" value="{{ pilot.ama_expiration or '' }}">

<label>FAA Number</label>
<input type="text" name="faa_number" value="{{ pilot.faa_number or '' }}">

<label>FAA Expiration</label>
<input type="date" name="faa_expiration" value="{{ pilot.faa_expiration or '' }}">

<button class="btn" type="submit">Save</button>

</form>

</div>

{% endblock %}
