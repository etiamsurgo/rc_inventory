{% extends "base.html" %}
{% block content %}

<h2>Edit Aircraft</h2>

<div class="card">
    <form method="POST">
        <input name="name" value="{{ aircraft.name }}" required>
        <input name="brand" value="{{ aircraft.brand }}">
        <input name="category" value="{{ aircraft.category }}">
        <input name="notes" value="{{ aircraft.notes }}">
        <button type="submit">Save Changes</button>
    </form>
</div>

{% endblock %}
