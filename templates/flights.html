{% extends "base.html" %}

{% block content %}

<h1>Flights</h1>

<h2>Log Flight</h2>

<form method="POST" action="/add_flight">

<label>Aircraft</label><br>

<select name="aircraft_id">

{% for a in aircraft %}
<option value="{{ a.id }}">{{ a.name }}</option>
{% endfor %}

</select>

<br><br>

<label>Hours</label><br>
<input type="number" name="hours" min="0" value="0">

<br><br>

<label>Minutes</label><br>
<input type="number" name="minutes" min="0" max="59" value="5">

<br><br>

<label>Notes</label><br>
<input type="text" name="notes">

<br><br>

<button type="submit">Log Flight</button>

</form>

<hr>

<h2>Flight Log</h2>

<table border="1">

<tr>
<th>Date</th>
<th>Aircraft</th>
<th>Flight Time</th>
<th>Notes</th>
</tr>

{% for f in flights %}

<tr>

<td>{{ f.date }}</td>

<td>{{ f.aircraft_name }}</td>

<td>
{{ (f.minutes // 60) }}h {{ (f.minutes % 60) }}m
</td>

<td>{{ f.notes }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
