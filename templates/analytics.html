{% extends "base.html" %}

{% block content %}

<h2>Battery Cycles</h2>

<canvas id="batteryChart"></canvas>

<h2>Aircraft Flight Time</h2>

<canvas id="flightChart"></canvas>

<script>

const batteryLabels = {{ battery_labels | tojson }};
const batteryData = {{ battery_cycles | tojson }};

new Chart(document.getElementById("batteryChart"), {

type: "bar",

data: {

labels: batteryLabels,

datasets: [{

label: "Battery Cycles",

data: batteryData

}]

}

});

const aircraftLabels = {{ aircraft_labels | tojson }};
const aircraftMinutes = {{ aircraft_minutes | tojson }};

new Chart(document.getElementById("flightChart"), {

type: "bar",

data: {

labels: aircraftLabels,

datasets: [{

label: "Flight Minutes",

data: aircraftMinutes

}]

}

});

</script>

{% endblock %}
