{% extends "base.html" %}

{% block content %}

<h2>RC Items</h2>

<a class="btn" href="/add_item">+ Add Item</a>

<div class="grid">

{% for i in items %}

<div class="card">

<h3>{{ i.name }}</h3>

<p><b>Category:</b> {{ i.category }}</p>

<p>{{ i.brand }} {{ i.model }}</p>

<p>{{ i.notes }}</p>

</div>

{% endfor %}

</div>

{% endblock %}
