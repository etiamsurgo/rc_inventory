{% extends "base.html" %}

{% block content %}

<h2>Quick Flight Logger</h2>

<form action="/quick_log" method="POST">

Aircraft

<select name="aircraft_id">
{% for a in aircraft %}
<option value="{{ a.id }}">{{ a.name }}</option>
{% endfor %}
</select>

Battery

<select name="battery_id">
{% for b in batteries %}
<option value="{{ b.id }}">{{ b.brand }} {{ b.capacity }}</option>
{% endfor %}
</select>

Minutes

<input type="number" name="minutes" required>

<button type="submit">Log Flight</button>

</form>

{% endblock %}
