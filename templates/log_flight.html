{% extends "base.html" %}

{% block content %}

<h2>Log Flight</h2>

<!-- 🔥 QUICK LOG (BIG BUTTONS) -->
<div class="card">

<h3>Quick Log</h3>

{% for a in aircraft %}

<div class="quick-row {% if loop.index <= 2 %}top-aircraft{% endif %}">

<div class="quick-title">
{{ a.name }}
{% if loop.index <= 2 %}
<span class="badge">Most Used</span>
{% endif %}
</div>

{% if a.default_battery_id %}

<div class="quick-buttons">
<a class="quick-btn" href="/log_flight?quick=5&aircraft={{ a.id }}">5 min</a>
<a class="quick-btn" href="/log_flight?quick=7&aircraft={{ a.id }}">7 min</a>
<a class="quick-btn" href="/log_flight?quick=10&aircraft={{ a.id }}">10 min</a>
</div>

{% else %}

<div class="warning">No default battery set</div>

{% endif %}

</div>

{% endfor %}

</div>


<!-- 🔧 MANUAL LOG -->
<div class="card">

<h3>Manual Log</h3>

<form method="POST">

<label>Aircraft</label>
<select name="aircraft" id="aircraft-select" required>
{% for a in aircraft %}
<option value="{{ a.id }}" data-battery="{{ a.default_battery_id }}">
{{ a.name }}
</option>
{% endfor %}
</select>

<label>Battery</label>
<select name="battery" id="battery-select" required>
{% for b in batteries %}
<option value="{{ b.id }}">
{{ b.name }} ({{ b.cycles }} cycles)
</option>
{% endfor %}
</select>

<label>Minutes</label>
<input type="number" name="minutes" required>

<br><br>

<button class="btn" type="submit">Log Flight</button>

</form>

</div>

<!-- 🔥 AUTO SELECT DEFAULT BATTERY -->
<script>
document.getElementById("aircraft-select").addEventListener("change", function() {

    let selected = this.options[this.selectedIndex];
    let batteryId = selected.getAttribute("data-battery");

    let batterySelect = document.getElementById("battery-select");

    if (batteryId) {
        for (let i = 0; i < batterySelect.options.length; i++) {
            if (batterySelect.options[i].value == batteryId) {
                batterySelect.selectedIndex = i;
                break;
            }
        }
    }
});
</script>

{% endblock %}
