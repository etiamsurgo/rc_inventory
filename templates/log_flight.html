{% extends "base.html" %}

{% block content %}

<h2>Log Flight</h2>

<form method="POST" class="card">

Aircraft
<select name="aircraft" required>

{% for a in aircraft %}
<option value="{{ a.id }}">{{ a.name }}</option>
{% endfor %}

</select>

Battery
<select name="battery" required>

{% for b in batteries %}
<option value="{{ b.id }}">{{ b.name }} ({{ b.cycles }} cycles)</option>
{% endfor %}

</select>

Flight Time (minutes)
<input type="number" name="minutes" required>

<br>

<button class="btn" type="submit">Log Flight</button>

</form>

{% endblock %}
