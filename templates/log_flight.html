{% extends "base.html" %}

{% block content %}

<h2>Log Flight</h2>

<form method="POST">

Aircraft<br>

<select name="aircraft_id">

{% for a in aircraft %}
<option value="{{a.id}}">{{a.name}}</option>
{% endfor %}

</select>

<br><br>

Battery<br>

<select name="battery_id">

{% for b in batteries %}
<option value="{{b.id}}">
{{ b.brand }} {{ b.capacity }}mAh
</option>
{% endfor %}

</select>

<br><br>

Duration (minutes)<br>

<input name="duration">

<br><br>

<button type="submit">Log Flight</button>

</form>

{% endblock %}
