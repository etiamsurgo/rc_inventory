{% extends "base.html" %}

{% block content %}

<h2>Add RC Accessory</h2>

<div class="form-container">

<form method="post">

<div class="form-grid">

<div>
<label>Name</label>
<input name="name">
</div>

<div>
<label>Category</label>

<select name="category">
<option value="Camera" {% if selected_category == 'Camera' %}selected{% endif %}>Camera</option>
<option value="Charger" {% if selected_category == 'Charger' %}selected{% endif %}>Charger</option>
<option value="ESC" {% if selected_category == 'ESC' %}selected{% endif %}>ESC</option>
<option value="Flight Controller" {% if selected_category == 'Flight Controller' %}selected{% endif %}>Flight Controller</option>
<option value="Goggles" {% if selected_category == 'Goggles' %}selected{% endif %}>Goggles</option>
<option value="Motor" {% if selected_category == 'Motor' %}selected{% endif %}>Motor</option>
<option value="Receiver" {% if selected_category == 'Receiver' %}selected{% endif %}>Receiver</option>
<option value="Remote ID" {% if selected_category == 'Remote ID' %}selected{% endif %}>Remote ID</option>
<option value="Servo" {% if selected_category == 'Servo' %}selected{% endif %}>Servo</option>
<option value="Transmitter" {% if selected_category == 'Transmitter' %}selected{% endif %}>Transmitter</option>
<option value="VTX" {% if selected_category == 'VTX' %}selected{% endif %}>VTX</option>
<option value="Other" {% if selected_category == 'Other' %}selected{% endif %}>Other</option>
</select>

</div>

<div>
<label>Brand</label>
<input name="brand">
</div>

<div>
<label>Model</label>
<input name="model">
</div>

<div>
<label>Serial</label>
<input name="serial">
</div>

<div class="form-grid-full">
<label>Notes</label>
<textarea name="notes"></textarea>
</div>

<div class="form-grid-full">
<button class="btn" type="submit">Add Item</button>
</div>

</div>

</form>

</div>

{% endblock %}
