{% extends "base.html" %}

{% block content %}

<h2>Add Aircraft</h2>

<form method="POST">

Name<br>
<input name="name"><br><br>

Type<br>
<input name="type"><br><br>

Default Battery<br>

<select name="default_battery">

<option value="">None</option>

{% for b in batteries %}
<option value="{{b.id}}">
{{ b.brand }} {{ b.capacity }}mAh
</option>
{% endfor %}

</select>

<br><br>

<button type="submit">Add Aircraft</button>

</form>

{% endblock %}
